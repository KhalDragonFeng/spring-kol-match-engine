server:
  port: 8080

spring:
  application:
    name: kol-match-engine

  # H2 Database (works out of the box, zero config)
  datasource:
    url: jdbc:h2:mem:matchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  # Redis - disabled by default (app works without it)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

  # RabbitMQ - disabled by default (app works without it)
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# MyBatis Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# App Config
app:
  match:
    max-results: 20
    min-score: 0.3
    cache-ttl-minutes: 30
  rabbitmq:
    enabled: false
  redis:
    enabled: false

logging:
  level:
    com.qifanfeng: DEBUG
    org.springframework.amqp: WARN
    org.springframework.data.redis: WARN
